plugins {
    id 'com.android.application'
}

android {
    namespace 'com.jap.order'
    compileSdk 34

    defaultConfig {
        applicationId 'com.jap.order'
        minSdk 26
        targetSdk 33
        versionCode 1
        versionName '1.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        debug { }
    }
}
